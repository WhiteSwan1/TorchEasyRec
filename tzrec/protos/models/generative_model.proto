syntax = "proto2";
package tzrec.protos;

// Generative (causal-LM) models.
//
// Each LLM family is registered DIRECTLY: the model_config oneof picks a family
// message (e.g. `qwen2_rec_lm`), whose message type name (`Qwen2RecLM`) resolves
// to the Python class of the same name. There is no `class_name` dispatch.
//
// Shared, architecture-agnostic config lives in `GenerativeRecLMConfig` and is
// embedded as `common` in every family message; family-specific knobs (e.g. the
// chat template) live on the family message itself. Adding a family = a new
// message like `Qwen2RecLM` + a same-named Python subclass of GenerativeRecLM.

// Architecture-agnostic config shared by ALL generative-rec families (the base
// reads this for everything except the backbone, which the family owns — see
// _backbone_id). Sample contract (consumed by `predict()`):
//   * user_sequence : list<int64>  — raw SID indices in [1, sum(codebook)]
//   * label         : list<int64>  — raw SID indices in [1, sum(codebook)]
// Both flow into TER as `sequence_raw_feature` parquet columns; the model maps
// SID -> token id by integer offset at batch time.
message GenerativeRecLMConfig {
    // Backbone (`hf_model_id`) is NOT here — it's the family's architecture
    // commitment, so it lives on the family message. (Old class_name was 1.)
    reserved 1;

    // SID vocabulary, one entry per RQ level: len = SID codes per item (answer
    // width), sum = atoms appended as C0..C{sum-1} after the base vocab.
    repeated uint32 codebook = 2;
    // Pad the post-extension vocab up to a multiple of this value.
    optional uint32 vocab_pad_to_multiple_of = 3 [default = 128];

    // Which `sequence_raw_feature` parquet columns carry the SID lists.
    required string user_sequence_feature_name = 4;
    required string label_feature_name = 5;

    // Cross-entropy ignore index — matches PyTorch's F.cross_entropy default.
    optional int32 ignore_index = 6 [default = -100];

    // Inference (beam search) — used only by predict()'s inference branch.
    optional uint32 num_beams = 7 [default = 50];
    optional uint32 num_return_sequences = 8 [default = 50];
}

// Qwen2 / Qwen2.5 family (Qwen2.5-0.5B, etc.). Registered directly via its
// message-type name; the Python class is `Qwen2RecLM`.
message Qwen2RecLM {
    // Architecture-agnostic config shared by all generative-rec families.
    optional GenerativeRecLMConfig common = 1;

    // Qwen2 backbone (HF hub id or local path; must be a Qwen2 model). Owned by
    // this family message, not `common`. Default = canonical 0.5B.
    optional string hf_model_id = 2 [default = "Qwen/Qwen2.5-0.5B"];

    // ----- Chat template (family-specific) -----
    // Optional override for the system instruction. Empty -> the family default
    // (Qwen2RecLM's algr-matching default).
    optional string system_instruction = 10 [default = ""];
    // Optional CN/EN text wrapping the SID codes in the user message, e.g.
    // "当前用户的历史行为如下：" / "，请预测用户在电商推荐场景后续行为的语义编码".
    optional string user_prefix_text = 11 [default = ""];
    optional string user_suffix_text = 12 [default = ""];
}
